<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PayloadForge — WAF Bypass Lab</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0e0e0e;--s1:#161616;--s2:#1c1c1c;
  --b1:#242424;--b2:#2e2e2e;--b3:#3a3a3a;
  --t1:#e4e4e4;--t2:#888;--t3:#555;
  --accent:#60a5fa;--green:#4ade80;--red:#f87171;--orange:#fb923c;
  --font:ui-monospace,'Cascadia Code','SF Mono',Menlo,Consolas,monospace;
  --r:4px;
}
html.light{
  --bg:#f7f7f7;--s1:#fff;--s2:#f1f1f1;
  --b1:#e5e5e5;--b2:#d4d4d4;--b3:#aaa;
  --t1:#111;--t2:#666;--t3:#aaa;
  --accent:#2563eb;--green:#16a34a;--red:#dc2626;--orange:#d97706;
}

html,body{height:100%;background:var(--bg);color:var(--t1);font-family:var(--font);font-size:13px;line-height:1.5;overflow:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
a{color:inherit;text-decoration:none}
button{font-family:var(--font)}

/* ── Layout ── */
#app{height:100vh;display:flex;flex-direction:column;max-width:1440px;margin:0 auto;padding:0 18px}

header{
  display:flex;align-items:flex-start;justify-content:space-between;
  padding:13px 0 11px;border-bottom:1px solid var(--b1);
  gap:12px;flex-wrap:wrap;flex-shrink:0;
}
.logo{flex-shrink:0}
.logo-name{font-size:14px;letter-spacing:3px;font-weight:700;color:var(--t1)}
.logo-name em{color:var(--accent);font-style:normal}
.logo-sub{font-size:9px;color:var(--t3);letter-spacing:2px;margin-top:1px;text-transform:uppercase}
.header-right{display:flex;align-items:flex-start;gap:8px;flex-wrap:wrap;justify-content:flex-end;flex:1}
.cat-tabs{display:flex;gap:3px;flex-wrap:wrap;justify-content:flex-end}

.cat-btn{
  padding:3px 9px;border-radius:var(--r);font-size:11px;cursor:pointer;
  border:1px solid var(--b1);color:var(--t3);background:transparent;
  transition:border-color .12s,color .12s,background .12s;
}
.cat-btn:hover{border-color:var(--b3);color:var(--t1)}
.cat-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(96,165,250,.08)}
html.light .cat-btn.active{background:rgba(37,99,235,.07)}

.theme-btn{
  padding:3px 9px;border:1px solid var(--b1);border-radius:var(--r);
  background:transparent;color:var(--t3);cursor:pointer;font-size:11px;
  transition:border-color .12s,color .12s;flex-shrink:0;
}
.theme-btn:hover{border-color:var(--b3);color:var(--t1)}

.body-grid{display:grid;grid-template-columns:260px 1fr;flex:1;min-height:0}

/* ── Sidebar ── */
aside{
  border-right:1px solid var(--b1);
  padding:12px 12px 12px 0;
  display:flex;flex-direction:column;min-height:0;overflow:hidden;
}
.search-wrap{position:relative;margin-bottom:8px;flex-shrink:0}
.search-wrap input{
  width:100%;background:var(--s2);border:1px solid var(--b1);border-radius:var(--r);
  padding:7px 8px 7px 28px;color:var(--t1);font-family:var(--font);font-size:12px;outline:none;
  transition:border-color .12s;
}
.search-wrap input:focus{border-color:var(--b3)}
.search-wrap input::placeholder{color:var(--t3)}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:11px;pointer-events:none}
.sidebar-meta{font-size:10px;color:var(--t3);letter-spacing:.5px;margin-bottom:6px;flex-shrink:0;text-transform:uppercase}
.payload-list{display:flex;flex-direction:column;gap:2px;overflow-y:auto;flex:1}

.payload-card{
  padding:7px 9px;border-radius:var(--r);cursor:pointer;
  border:1px solid transparent;background:transparent;
  transition:background .1s,border-color .1s;display:block;
}
.payload-card:hover{background:var(--s2);border-color:var(--b1)}
.payload-card.active{background:var(--s1);border-color:var(--b2)}
.pname{
  font-size:11px;color:var(--t1);margin-bottom:2px;
  display:flex;align-items:center;justify-content:space-between;gap:6px;
}
.sbadge{font-size:9px;padding:1px 4px;border-radius:2px;flex-shrink:0}
.spatt{border:1px solid rgba(74,222,128,.25);color:rgba(74,222,128,.5)}
.spf{border:1px solid rgba(251,146,60,.25);color:rgba(251,146,60,.5)}
.ppreview{font-size:10px;color:var(--t3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:3px}
.tags{display:flex;gap:2px;flex-wrap:wrap}
.tag{font-size:9px;padding:1px 4px;border-radius:2px;border:1px solid var(--b1);color:var(--t3)}

/* ── Main ── */
main{padding:12px 0 0 16px;display:flex;flex-direction:column;min-height:0;overflow:hidden}
.tab-nav{display:flex;border-bottom:1px solid var(--b1);margin-bottom:14px;flex-shrink:0}
.tab-btn{
  padding:7px 14px;background:transparent;border:none;
  border-bottom:2px solid transparent;color:var(--t3);cursor:pointer;
  font-size:11px;letter-spacing:.5px;text-transform:uppercase;
  transition:color .12s,border-color .12s;
}
.tab-btn:hover{color:var(--t1)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}

#tab-content{flex:1;overflow-y:auto;padding-bottom:16px}

/* ── Library ── */
.lib-header{margin-bottom:12px}
.lib-header h2{font-size:12px;color:var(--t1);letter-spacing:2px;margin-bottom:3px;text-transform:uppercase}
.lib-header p{font-size:10px;color:var(--t3)}
.lib-header p span{margin-right:10px}
.lib-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.lib-card{
  background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);
  padding:10px 12px;cursor:pointer;transition:border-color .12s;display:block;
}
.lib-card:hover{border-color:var(--b3)}
.lname{font-size:11px;color:var(--t1);margin-bottom:5px;display:flex;align-items:center;justify-content:space-between;gap:6px}
.lib-payload{
  background:var(--s2);border:1px solid var(--b1);border-radius:var(--r);
  padding:5px 8px;font-size:10px;margin-bottom:5px;
  word-break:break-all;color:var(--t2);
}

/* ── Custom / form ── */
.slabel{font-size:10px;color:var(--t3);letter-spacing:1px;display:block;margin-bottom:5px;text-transform:uppercase}
.loaded-info{font-size:10px;color:var(--t3);margin-bottom:10px;letter-spacing:.5px}
.loaded-info span{color:var(--t2)}

textarea{
  width:100%;background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);
  padding:9px;color:var(--t1);font-size:12px;font-family:var(--font);
  resize:vertical;outline:none;margin-bottom:12px;transition:border-color .12s;
}
textarea:focus{border-color:var(--b3)}
textarea::placeholder{color:var(--t3)}

.chip-group{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.chip{
  padding:3px 9px;border-radius:var(--r);cursor:pointer;
  font-size:11px;border:1px solid var(--b1);background:transparent;color:var(--t3);
  transition:border-color .12s,color .12s,background .12s;
}
.chip:hover{border-color:var(--b3);color:var(--t1)}
.chip.aw{border-color:var(--accent);color:var(--accent);background:rgba(96,165,250,.07)}
html.light .chip.aw{background:rgba(37,99,235,.06)}
.chip.am{border-color:var(--orange);color:var(--orange)}
.chip.cc{border-style:dashed}

.waf-note{font-size:10px;color:var(--t3);margin-bottom:10px;min-height:14px}
.gen-btn{
  padding:8px 20px;background:var(--accent);border:none;
  color:#fff;font-size:12px;font-weight:700;letter-spacing:1.5px;
  cursor:pointer;border-radius:var(--r);transition:opacity .12s;
}
.gen-btn:hover{opacity:.85}

/* ── Mutation results ── */
.mut-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-shrink:0}
.mut-count{font-size:11px;color:var(--t2);letter-spacing:.5px}
.export-btns{display:flex;gap:4px}
.exp-btn{
  padding:3px 9px;border:1px solid var(--b1);background:transparent;color:var(--t3);
  font-size:11px;border-radius:var(--r);cursor:pointer;transition:border-color .12s,color .12s;
}
.exp-btn:hover{border-color:var(--b3);color:var(--t1)}
.base-label{font-size:10px;color:var(--t3);margin-bottom:10px;word-break:break-all;letter-spacing:.5px}
.base-label span{color:var(--t2)}
.mut-list{display:flex;flex-direction:column;gap:3px}
.mut-row{
  background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);
  padding:7px 11px;display:grid;grid-template-columns:150px 1fr auto;align-items:center;gap:10px;
}
.mut-lbl{font-size:10px;color:var(--orange)}
.mut-val{font-size:11px;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
.mut-val:hover{color:var(--t1)}
.copy-btn{
  background:transparent;border:1px solid var(--b1);color:var(--t3);
  cursor:pointer;padding:2px 9px;font-size:10px;border-radius:var(--r);
  letter-spacing:.5px;transition:border-color .12s,color .12s;white-space:nowrap;
}
.copy-btn:hover{border-color:var(--accent);color:var(--accent)}

/* ── Empty state ── */
.empty{text-align:center;padding:60px 20px;color:var(--t3)}
.empty .ei{font-size:28px;margin-bottom:10px}
.empty p{font-size:11px;letter-spacing:.5px}
.empty small{font-size:10px;color:var(--b3);margin-top:4px;display:block}

/* ── JWT editor ── */
.jwt-editor{display:flex;flex-direction:column;gap:8px}
.jp{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:12px}
.jpt{font-size:9px;color:var(--t3);letter-spacing:2px;margin-bottom:8px;text-transform:uppercase}
.jta{
  width:100%;background:var(--s2);border:1px solid var(--b1);border-radius:var(--r);
  padding:8px;color:var(--t1);font-size:11px;font-family:var(--font);
  resize:vertical;outline:none;min-height:60px;transition:border-color .12s;margin-bottom:0;
}
.jta:focus{border-color:var(--b3)}
.jrow{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.jbadge{padding:2px 8px;border-radius:10px;font-size:9px;display:inline-block;margin-right:5px}
.jhs{border:1px solid rgba(251,191,36,.35);color:rgba(251,191,36,.75)}
.jrs{border:1px solid rgba(96,165,250,.35);color:rgba(96,165,250,.75)}
.jnone{border:1px solid rgba(248,113,113,.35);color:rgba(248,113,113,.75)}
.jbtn{
  padding:5px 12px;border:1px solid var(--b2);background:transparent;color:var(--t2);
  font-family:var(--font);font-size:11px;border-radius:var(--r);cursor:pointer;
  transition:border-color .12s,color .12s;
}
.jbtn:hover{border-color:var(--accent);color:var(--accent)}
.jforged{
  background:var(--s2);border:1px solid var(--b1);border-radius:var(--r);
  padding:8px;font-size:11px;color:var(--t1);word-break:break-all;margin-top:8px;display:none;
}
.jatk{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:8px}
.jatkbtn{
  padding:5px 9px;border:1px solid var(--b1);background:transparent;color:var(--t2);
  font-family:var(--font);font-size:11px;border-radius:var(--r);cursor:pointer;
  transition:border-color .12s,color .12s;text-align:left;
}
.jatkbtn:hover{border-color:var(--red);color:var(--red)}

/* ── Clickjacking ── */
.cj-wrap{display:flex;flex-direction:column;gap:10px}
.cj-desc{font-size:11px;color:var(--t2);line-height:1.7}
.cj-row{display:flex;gap:6px;align-items:center}
.cj-inp{
  flex:1;background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);
  padding:7px 10px;color:var(--t1);font-family:var(--font);font-size:12px;outline:none;
  transition:border-color .12s;
}
.cj-inp:focus{border-color:var(--b3)}
.cj-btn{
  padding:7px 14px;background:var(--accent);border:none;color:#fff;
  font-family:var(--font);font-size:11px;border-radius:var(--r);cursor:pointer;
  white-space:nowrap;transition:opacity .12s;
}
.cj-btn:hover{opacity:.85}
.cj-btn.sec{background:var(--orange)}
.cj-box{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);overflow:hidden}
.cj-bar{padding:6px 11px;font-size:10px;letter-spacing:.5px;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--b1)}
.cj-vuln{border-bottom-color:rgba(248,113,113,.2)}
.cj-safe{border-bottom-color:rgba(74,222,128,.2)}
.cj-ifwrap{position:relative;background:var(--s2)}
.cj-iframe{width:100%;height:420px;border:none;display:block}
.cj-overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;display:none}
.cj-fake{
  position:absolute;top:38%;left:50%;transform:translate(-50%,-50%);
  background:var(--red);color:#fff;padding:12px 22px;font-size:15px;
  border-radius:6px;cursor:pointer;pointer-events:auto;animation:cjp 1.5s infinite;
}
@keyframes cjp{0%,100%{opacity:.8}50%{opacity:1}}
.cj-igrid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.cj-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:10px}
.cj-card h4{font-size:9px;letter-spacing:1.5px;margin-bottom:4px;text-transform:uppercase}
.cj-card p{font-size:10px;color:var(--t2);line-height:1.7}

/* ── Footer ── */
.credit{
  font-size:10px;color:var(--t3);padding:12px 0;
  border-top:1px solid var(--b1);text-align:center;flex-shrink:0;
}
.credit a{color:var(--accent);opacity:.6}
.credit a:hover{opacity:1}

/* ── Responsive ── */
@media(max-width:900px){
  .body-grid{grid-template-columns:1fr}
  aside{border-right:none;border-bottom:1px solid var(--b1);padding:10px 0;max-height:240px}
  main{padding:12px 0 0}
  .lib-grid{grid-template-columns:1fr}
  .mut-row{grid-template-columns:1fr auto}
  .mut-lbl{display:none}
  .jrow,.jatk,.cj-igrid{grid-template-columns:1fr}
}
@media(max-width:600px){
  .logo-name{font-size:12px}
  .header-right{width:100%}
  .cat-tabs{justify-content:flex-start}
}
</style>
</head>

function h(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function copyText(text, btn) {
  const flash = (b) => {
    const orig = b.textContent;
    b.textContent = 'COPIED';
    b.style.borderColor = 'var(--green)';
    b.style.color = 'var(--green)';
    setTimeout(() => { b.textContent = orig; b.style.borderColor = ''; b.style.color = ''; }, 1400);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => { if(btn) flash(btn); }).catch(() => fallbackCopy(text, btn));
  } else { fallbackCopy(text, btn); }
}

function fallbackCopy(text, btn) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.cssText = 'position:fixed;opacity:0';
  document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
  if (btn) {
    const orig = btn.textContent;
    btn.textContent = 'COPIED'; btn.style.borderColor = 'var(--green)'; btn.style.color = 'var(--green)';
    setTimeout(() => { btn.textContent = orig; btn.style.borderColor = ''; btn.style.color = ''; }, 1400);
  }
}

function download(content, filename, mime) {
  const blob = new Blob([content], {type: mime});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

function getFilteredPayloads() {
  const list = PAYLOADS[S.cat] || [];
  if (!S.search) return list;
  const q = S.search.toLowerCase();
  return list.filter(p =>
    p.name.toLowerCase().includes(q) ||
    p.tags.some(t => t.includes(q)) ||
    p.payload.toLowerCase().includes(q)
  );
}

function findPayload(id) {
  for (const list of Object.values(PAYLOADS))
    for (const p of list) if (p.id === id) return p;
  return null;
}

// ── MUTATION ENGINE ───────────────────────────────────────────────────────────
function mutate(p, type) {
  switch(type) {
    case 'url_encode':
      return encodeURIComponent(p);
    case 'double_url_encode':
      return encodeURIComponent(encodeURIComponent(p));
    case 'html_entity':
      return p.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
               .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    case 'base64':
      try { return btoa(unescape(encodeURIComponent(p))); } catch(e) { return btoa(p); }
    case 'hex_encode':
      return [...p].map(c => '%' + c.charCodeAt(0).toString(16).toUpperCase().padStart(2,'0')).join('');
    case 'unicode_escape':
      return [...p].map(c => '\\u' + c.charCodeAt(0).toString(16).padStart(4,'0')).join('');
    case 'case_alternation':
      return [...p].map((c,i) => i%2===0 ? c.toLowerCase() : c.toUpperCase()).join('');
    case 'null_byte':
      return p + '%00';
    case 'sql_comment':
      return p.replace(/ /g, '/**/');
    case 'tab_substitute':
      return p.replace(/ /g, '%09');
    case 'newline_inject':
      return p.replace(/ /g, '%0a');
    case 'json_unicode':
      return [...p].map(c => c.charCodeAt(0) > 127
        ? '\\u' + c.charCodeAt(0).toString(16).padStart(4,'0') : c).join('');
    case 'html_hex':
      return [...p].map(c => '&#x' + c.charCodeAt(0).toString(16).toUpperCase() + ';').join('');
    default: return p;
  }
}

function b64ud(s){
  s=s.replace(/-/g,'+').replace(/_/g,'/');
  while(s.length%4)s+='=';
  try{return atob(s);}catch(e){return null;}
}
function b64ue(s){
  return btoa(unescape(encodeURIComponent(s))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}

function decodeJwt(){
  const raw=(document.getElementById('jwtInput').value||'').trim();
  const parts=raw.split('.');
  if(parts.length!==3){alert('Invalid JWT: expected 3 parts');return;}
  try{
    const hd=JSON.parse(b64ud(parts[0]));
    const pd=JSON.parse(b64ud(parts[1]));
    document.getElementById('jwtHeader').value=JSON.stringify(hd,null,2);
    document.getElementById('jwtPayload').value=JSON.stringify(pd,null,2);
    const alg=(hd.alg||'').toUpperCase();
    const badge=document.getElementById('jwtAlgBadge');
    let cls='jhs',warn='';
    if(alg==='NONE'||alg===''){cls='jnone';warn=' — UNSIGNED';}
    else if(alg[0]==='R'||alg[0]==='E'){cls='jrs';}
    badge.innerHTML=`<span class="jbadge ${cls}">alg: ${h(alg||'none')}${warn}</span>`
      +`<span style="font-size:9px;color:var(--t3);margin-left:6px">sig: ${parts[2].substring(0,16)}...</span>`;
  }catch(e){alert('Decode failed: '+e.message);}
}

function jwtAttack(type){
  let hd,pd;
  try{hd=JSON.parse(document.getElementById('jwtHeader').value||'{}');}catch(e){hd={};}
  try{pd=JSON.parse(document.getElementById('jwtPayload').value||'{}');}catch(e){pd={};}
  if(type==='algnone'){hd.alg='none';}
  else if(type==='admin'){pd.role='admin';pd.isAdmin=true;pd.admin=true;}
  else if(type==='exp'){pd.exp=9999999999;pd.iat=Math.floor(Date.now()/1000);}
  else if(type==='isadmin'){pd.isAdmin=true;pd.is_admin=true;pd.admin=1;}
  else if(type==='kidnull'){hd.kid='../../dev/null';hd.alg='HS256';}
  else if(type==='kidsqli'){hd.kid="x' UNION SELECT 'secret'-- -";hd.alg='HS256';}
  document.getElementById('jwtHeader').value=JSON.stringify(hd,null,2);
  document.getElementById('jwtPayload').value=JSON.stringify(pd,null,2);
}

function forgeJwt(algNone){
  let hd,pd;
  try{hd=JSON.parse(document.getElementById('jwtHeader').value);}catch(e){alert('Invalid header JSON');return;}
  try{pd=JSON.parse(document.getElementById('jwtPayload').value);}catch(e){alert('Invalid payload JSON');return;}
  if(algNone)hd.alg='none';
  const token=b64ue(JSON.stringify(hd))+'.'+b64ue(JSON.stringify(pd))+'.'+(algNone?'':'REPLACE_WITH_REAL_SIGNATURE');
  const el=document.getElementById('jwtForged');
  el.textContent=token;el.style.display='block';el._value=token;
}

      if(doc){dot.style.color='var(--red)';bar.className='cj-bar cj-vuln';txt.textContent='VULNERABLE — page loaded in iframe';hdr.textContent='X-Frame-Options: NOT SET';}
    }catch(e){
      dot.style.color='var(--red)';bar.className='cj-bar cj-vuln';
      txt.textContent='VULNERABLE — page loaded (cross-origin)';hdr.textContent='Check DevTools headers';
    }
  };
  frame.onerror=function(){dot.style.color='var(--t3)';txt.textContent='Could not load — network error or HTTPS required';};
  setTimeout(function(){
    if(dot.style.color==='var(--orange)'){
      dot.style.color='var(--green)';bar.className='cj-bar cj-safe';
      txt.textContent='PROTECTED — browser blocked iframe';hdr.textContent='Check DevTools Network tab';
    }
  },3000);
  frame.src=url;
}

function toggleCjOv(){
  _ovOn=!_ovOn;
  const ov=document.getElementById('cjOv');
  if(ov)ov.style.display=_ovOn?'block':'none';
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function setCategory(cat) {
  S.cat = cat; S.tab = 'library'; S.pid = ''; S.search = '';
  document.getElementById('search-input').value = '';
  renderAll();
}

function setTab(tab) {
  S.tab = tab;
  renderTabNav();
  renderTabContent();
}

function onSearch(q) {
  S.search = q.toLowerCase();
  renderSidebar();
}

function selectPayload(id) {
  S.pid = id;
  const p = findPayload(id);
  if (p) S.customPayload = p.payload;
  S.tab = 'custom';
  renderSidebar();
  renderTabNav();
  renderTabContent();
  document.querySelector(`[data-id="${id}"]`);
}

// ── THEME ─────────────────────────────────────────────────────────────────────
function toggleTheme() {
  const light = document.documentElement.classList.toggle('light');
  localStorage.setItem('pf_theme', light ? 'light' : 'dark');
  document.getElementById('theme-btn').textContent = light ? '◑ LIGHT' : '◐ DARK';
}

// ── INIT ──────────────────────────────────────────────────────────────────────
(function init() {
  if (localStorage.getItem('pf_theme') === 'light') {
    document.documentElement.classList.add('light');
    document.addEventListener('DOMContentLoaded', () => {
      const b = document.getElementById('theme-btn');
      if (b) b.textContent = '◑ LIGHT';
    });
  }
  renderAll();
})();
</script>
</body>
</html>
